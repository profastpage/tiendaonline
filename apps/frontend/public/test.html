<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Tiendas Multi-Tenant</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e5e7eb;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #10b981;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .card {
            background: #1f2937;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid #374151;
        }
        .card h2 {
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .price {
            color: #10b981;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Tiendas Multi-Tenant Funciona!</h1>
        <p>Frontend corriendo en localhost:4000</p>
        
        <h2 style="margin-top: 2rem; color: #fff;">Productos de Demostración</h2>
        <div class="grid">
            <div class="card">
                <h2>Polera Oversize Black</h2>
                <p class="price">S/ 89.90</p>
            </div>
            <div class="card">
                <h2>Polera Graphic White</h2>
                <p class="price">S/ 79.90</p>
            </div>
            <div class="card">
                <h2>Jean Slim Fit Dark</h2>
                <p class="price">S/ 149.90</p>
            </div>
        </div>
    </div>
</body>
</html>
